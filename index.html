// 实时北京时间
function updateTime() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const h = String(now.getHours()).padStart(2,'0');
  const i = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('nowTime').innerText = 
    `北京时间 ${y}-${m}-${d} ${h}:${i}:${s}`;
}
setInterval(updateTime, 1000);
updateTime();

// 音乐控制
const bgMusic = document.getElementById('bgMusic');
const musicBtn = document.getElementById('musicBtn');
let isPlaying = false;

function toggleMusic() {
  if (isPlaying) {
    bgMusic.pause();
    musicBtn.classList.remove('playing');
    musicBtn.innerText = '🎵';
  } else {
    bgMusic.play();
    musicBtn.classList.add('playing');
    musicBtn.innerText = '⏸';
  }
  isPlaying = !isPlaying;
}

// 轮播图自动播放
let swiperIndex = 0;
const dots = document.querySelectorAll('.dot');
function autoSwiper(){
  swiperIndex++;
  if(swiperIndex >= 3) swiperIndex = 0;
  document.getElementById('swiperWrap').style.transform = `translateX(-${swiperIndex * 100}%)`;
  dots.forEach((d,i) => d.classList.toggle('active', i === swiperIndex));
}
setInterval(autoSwiper, 4000);

// 金额大写转换
function digitToUpper(num) {
  const digit = ['零','壹','贰','叁','肆','伍','陆','柒','捌','玖'];
  const unit = ['','拾','佰','仟','万'];
  let str = num.toString().split('').reverse();
  let res = '';
  for(let i=0;i<str.length;i++){
    let n = parseInt(str[i]);
    if(n!==0) res = digit[n] + unit[i] + res;
    else if(res[0]!==digit[0]) res = digit[0] + res;
  }
  res = res.replace(/零+/g,'零').replace(/零$/,'') + '元整';
  return res || '零元整';
}

// 弹窗
function openModal(item) {
  document.getElementById('mId').innerText = item.id;
  document.getElementById('mName').innerText = item.name;
  document.getElementById('mMoney').innerText = item.money;
  document.getElementById('mUpper').innerText = digitToUpper(item.money);
  document.getElementById('mNote').innerText = item.note || '无备注';
  document.getElementById('detailModal').style.display = 'flex';
}
function closeModal() {
  document.getElementById('detailModal').style.display = 'none';
}

// 登录
function login() {
  const user = document.getElementById('username').value.trim();
  const pwd = document.getElementById('password').value.trim();
  if (user === 'admin' && pwd === 'admin') {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('copyLogin').style.display = 'none';
    document.getElementById('mainBox').style.display = 'block';
    document.getElementById('copyMain').style.display = 'block';
    document.getElementById('swiperBox').style.display = 'block';
    document.getElementById('musicBtn').style.display = 'flex';
    
    bgMusic.play().catch(err => {});
    isPlaying = true;
    musicBtn.classList.add('playing');
    musicBtn.innerText = '⏸';
  } else {
    alert('用户名或密码错误');
  }
}

let show = [...data];
let moneySortAsc = false;

function calcStats() {
  const count = show.length;
  const total = show.reduce((s, item) => s + item.money, 0);
  document.getElementById("totalCount").innerText = count + " 户";
  document.getElementById("totalMoney").innerText = total + " 元";
}

function render(){
  const el = document.getElementById("list");
  el.innerHTML = "";
  show.forEach(item=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${item.id}</td>
      <td class="name" onclick="openModal(${JSON.stringify(item).replace(/"/g, '&quot;')})">${item.name}</td>
      <td>${item.money}</td>
      <td>${item.note}</td>
    `;
    el.appendChild(tr);
  })
  calcStats();
}

function search(){
  const kw = document.getElementById("search").value.trim();
  if(!kw){ render(); return; }
  show = data.filter(item=>item.name.includes(kw));
  render();
}

function reset(){
  document.getElementById("search").value = "";
  show = [...data];
  moneySortAsc = false;
  render();
}

function sortByMoney() {
  moneySortAsc = !moneySortAsc;
  show.sort((a, b) => moneySortAsc ? a.money - b.money : b.money - a.money);
  render();
}
